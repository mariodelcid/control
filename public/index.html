<style>

const {useState,useEffect,useRef,useCallback,useMemo}=React;

      page==='sales'&&React.createElement(Sales,{sales,reload:loadAll}),
      page==='overhead'&&React.createElement(Overhead,{overhead,reload:loadAll,totalOverhead,totalUnits,overheadPerUnit}),

function Dashboard({products,sales,totalOverhead,totalUnits,overheadPerUnit}){

  const totalCosts=products.reduce((s,p)=>s+p.totalCost*p.unitsPerMonth,0);

    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'$'+v,color:'#94a3b8'},grid:{color:'rgba(71,85,105,.3)'}},x:{ticks:{color:'#94a3b8',maxRotation:45},grid:{display:false}}}}});
  },[products]);
  return React.createElement('div',null,
    React.createElement('h1',{className:'page-title'},'\u{1F4CA} Dashboard'),
    React.createElement('div',{className:'cards-row'},
      React.createElement('div',{className:'stat-card'},React.createElement('div',{className:'label'},'Monthly Revenue'),React.createElement('div',{className:'value'},fmt(totalRevenue))),
      React.createElement('div',{className:'stat-card'},React.createElement('div',{className:'label'},'Monthly Profit'),React.createElement('div',{className:'value '+(totalProfit>=0?'positive':'negative')},fmt(totalProfit))),

      React.createElement('div',{className:'stat-card'},React.createElement('div',{className:'label'},'Total Units/Month'),React.createElement('div',{className:'value'},totalUnits.toLocaleString())),
      React.createElement('div',{className:'stat-card'},React.createElement('div',{className:'label'},'Overhead/Unit'),React.createElement('div',{className:'value'},fmt(overheadPerUnit))),
      React.createElement('div',{className:'stat-card'},React.createElement('div',{className:'label'},'Best Margin'),bestProduct&&React.createElement('div',{className:'value positive',style:{fontSize:'1rem'}},bestProduct.name),bestProduct&&React.createElement('div',{className:'sub positive'},fmtPct(bestProduct.margin)))
    ),
    React.createElement('div',{className:'grid-2'},
      React.createElement('div',{className:'chart-container'},React.createElement('h3',null,'Profit Margin by Product'),React.createElement('div',{style:{height:'300px'}},React.createElement('canvas',{ref:chartRef}))),
      React.createElement('div',{className:'chart-container'},React.createElement('h3',null,'Monthly Profit Contribution ($)'),React.createElement('div',{style:{height:'300px'}},React.createElement('canvas',{ref:chartRef2})))
    ),
    React.createElement('div',{className:'table-wrap'},
      React.createElement('table',null,
        React.createElement('thead',null,React.createElement('tr',null,
          ...['Product','Sell Price','Ing. Cost','Pkg. Cost','Overhead','Total Cost','Profit','Margin'].map(h=>React.createElement('th',{key:h},h))
        )),
        React.createElement('tbody',null,...products.map(p=>
          React.createElement('tr',{key:p.id},
            React.createElement('td',{style:{fontWeight:600}},p.name),
            React.createElement('td',null,fmt(p.sellPrice)),

function IngredientAutocomplete({ingredients,onSelect}){
  const[query,setQuery]=useState('');
  const[open,setOpen]=useState(false);
  const[hlIdx,setHlIdx]=useState(0);
  const wrapRef=useRef(null);
  const filtered=query.length>0?ingredients.filter(i=>i.name.toLowerCase().includes(query.toLowerCase())):ingredients;
  useEffect(()=>{
    const handler=(e)=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false)};
    document.addEventListener('mousedown',handler);return()=>document.removeEventListener('mousedown',handler);
  },[]);
  useEffect(()=>{setHlIdx(0)},[query]);
  const pick=(ing)=>{onSelect(ing.name);setQuery('');setOpen(false)};
  const onKey=(e)=>{
    if(e.key==='ArrowDown'){e.preventDefault();setHlIdx(i=>Math.min(i+1,filtered.length-1))}
    else if(e.key==='ArrowUp'){e.preventDefault();setHlIdx(i=>Math.max(i-1,0))}
    else if(e.key==='Enter'&&filtered[hlIdx]){e.preventDefault();pick(filtered[hlIdx])}
    else if(e.key==='Escape'){setOpen(false)}
  };
  return React.createElement('div',{ref:wrapRef,className:'autocomplete-wrap',style:{marginTop:'0.5rem'}},
    React.createElement('input',{placeholder:'Type to search ingredients...',value:query,
      onChange:e=>{setQuery(e.target.value);setOpen(true)},
      onFocus:()=>setOpen(true),onKeyDown:onKey,
      style:{fontSize:'0.75rem',width:'100%'}}),
    open&&filtered.length>0&&React.createElement('div',{className:'autocomplete-list open'},
      ...filtered.slice(0,15).map((ing,idx)=>
        React.createElement('div',{key:ing.code,className:idx===hlIdx?'highlighted':'',
          onMouseEnter:()=>setHlIdx(idx),onClick:()=>pick(ing)},
          React.createElement('span',null,ing.name),
          React.createElement('span',{style:{color:'var(--text2)',fontSize:'0.7rem'}},fmt(ing.costPerOz)+'/oz')
        )
      )
    )
  );
}
const ING_UNITS=['oz','unit','g','lb','tsp','tbsp','cup'];
const PKG_UNITS=['unit','pkg','box','bag','roll','sheet','wrap'];

function Products({products,reload,ingredients,packaging}){

    React.createElement('h1',{className:'page-title'},'\u{1F33D} Products & Bill of Materials'),

          )),
          React.createElement('tbody',null,...filtered.map(p=>
            React.createElement('tr',{key:p.id,style:{cursor:'pointer',background:editing===p.id?'rgba(245,158,11,.1)':''},onClick:()=>setEditing(p.id)},
              React.createElement('td',{style:{fontWeight:600}},p.name),
              React.createElement('td',null,fmt(p.sellPrice)),
              React.createElement('td',null,fmt(p.ingCost)),

function Reports({products,sales,totalOverhead}){
  const[reportType,setReportType]=useState('profitability');
  const chartRef=useRef(null);const chartInst=useRef(null);
  const totalRevenue=products.reduce((s,p)=>s+p.sellPrice*p.unitsPerMonth,0);
  const totalIngCost=products.reduce((s,p)=>s+p.ingCost*p.unitsPerMonth,0);
  const totalPkgCost=products.reduce((s,p)=>s+p.pkgCost*p.unitsPerMonth,0);
  const totalProfit=totalRevenue-totalIngCost-totalPkgCost-totalOverhead;
  const monthlyData=useMemo(()=>{
    const byMonth={};
    sales.forEach(s=>{
      const ym=s.date.substring(0,7);
      if(!byMonth[ym])byMonth[ym]={month:ym,days:0,totalSales:0,card:0,cash:0};
      byMonth[ym].days++;
      byMonth[ym].totalSales+=s.totalSales||0;
      byMonth[ym].card+=s.cardAmount||0;
      byMonth[ym].cash+=(s.totalSales||0)-(s.cardAmount||0);
    });
    return Object.values(byMonth).sort((a,b)=>b.month.localeCompare(a.month)).map(m=>{
      const d=new Date(m.month+'-15');
      const daysInMonth=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
      const fixedCost=totalOverhead/daysInMonth*m.days;
      return{...m,fixedCost:Math.round(fixedCost*100)/100,profit:Math.round((m.totalSales-fixedCost)*100)/100};
    });
  },[sales,totalOverhead]);
  useEffect(()=>{
    if(!chartRef.current)return;
    if(chartInst.current)chartInst.current.destroy();
    if(reportType==='profitability'){
      chartInst.current=new Chart(chartRef.current,{type:'doughnut',data:{
        labels:['Ingredients','Packaging','Overhead','Profit'],
        datasets:[{data:[totalIngCost.toFixed(2),totalPkgCost.toFixed(2),totalOverhead.toFixed(2),Math.max(0,totalProfit).toFixed(2)],
        backgroundColor:['#ef4444','#3b82f6','#8b5cf6','#22c55e']}]
      },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8'}}}}});
    }else if(reportType==='sales'){
      const byDay={};sales.forEach(e=>{
        const total=['vCh','vGra','v24','v20','v16','vNieve','charolas','cheetos','conchitas','sopas','vSopas','doritos','hotCup','redBull','tostitos','takis'].reduce((s,c)=>s+(e[c]||0),0);
        if(!byDay[e.day])byDay[e.day]={total:0,count:0};byDay[e.day].total+=total;byDay[e.day].count++;
      });
      const dayOrder=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const labels=dayOrder.filter(d=>byDay[d]);
      chartInst.current=new Chart(chartRef.current,{type:'bar',data:{
